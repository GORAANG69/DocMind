services:
  - type: web
    name: docmind-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: VITE_API_URL
        value: "https://docmind-backend.onrender.com"
      - key: OPENAI_API_KEY
        sync: false
    disk:
      name: docmind-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
